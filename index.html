<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>南化區圖書館投遞箱</title>
  <style>
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #f3f6f9; 
      margin: 0; 
      padding: 20px; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh; 
      box-sizing: border-box; 
    }
    .card { 
      background: white; 
      padding: 35px 24px; 
      border-radius: 24px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      width: 100%; 
      max-width: 480px;
      text-align: center; 
      box-sizing: border-box;
    }
    h2 { 
      color: #0f172a; 
      margin: 0 0 8px 0; 
      font-size: 32px; 
      font-weight: 700;
    }
    p { 
      color: #64748b; 
      font-size: 16px; 
      margin: 0 0 24px 0; 
      line-height: 1.5; 
    }
    .upload-zone { 
      position: relative; 
      background-color: #f1f5f9; 
      border: 2.5px dashed #cbd5e1; 
      border-radius: 16px; 
      padding: 50px 20px; 
      margin-bottom: 24px; 
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .upload-zone input[type=file] { 
      position: absolute; 
      left: 0; 
      top: 0; 
      width: 100%;
      height: 100%;
      opacity: 0; 
      cursor: pointer; 
    }
    .icon-wrapper {
      background: white;
      border-radius: 16px;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      margin-bottom: 16px;
    }
    .cloud-icon {
      width: 32px;
      height: 32px;
      fill: #2563eb;
    }
    .prompt-text {
      color: #2563eb;
      font-size: 18px;
      font-weight: 700;
    }
    #file-info { 
      margin: -10px 0 20px 0; 
      font-size: 15px; 
      color: #1e293b; 
      word-break: break-all; 
      background: #f8fafc;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      display: none;
    }
    #submit-btn { 
      background: #2563eb; 
      color: white; 
      border: none; 
      padding: 18px; 
      border-radius: 14px; 
      font-size: 20px; 
      font-weight: 600;
      width: 100%; 
      cursor: pointer; 
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }
    #submit-btn:disabled { 
      background: #93c5fd; 
      cursor: not-allowed; 
      box-shadow: none;
    }
    .send-icon {
      width: 20px;
      height: 20px;
      fill: white;
      margin-right: 8px;
    }
    #status { 
      margin-top: 20px; 
      font-weight: 600; 
      font-size: 16px; 
      line-height: 1.5;
    }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    .spinner { 
      display: inline-block; 
      width: 20px; 
      height: 20px; 
      border: 3px solid rgba(255,255,255,.3); 
      border-radius: 50%; 
      border-top-color: white; 
      animation: spin 1s ease-in-out infinite; 
      margin-right: 8px; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <h2>南化區圖檔案投遞箱</h2>
  <p>請選擇您要上傳的檔案或照片</p>
  
  <form id="uploadForm">
    <div class="upload-zone">
      <div class="icon-wrapper">
        <svg class="cloud-icon" viewBox="0 0 24 24">
          <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
        </svg>
      </div>
      <div class="prompt-text" id="prompt-label">選擇檔案 / 拍照</div>
      <input type="file" id="myFile" name="myFile" onchange="showFileInfo()">
    </div>
    
    <div id="file-info"></div>
    
    <button type="button" id="submit-btn" disabled onclick="startUpload()">
      <svg class="send-icon" viewBox="0 0 24 24">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
      <span id="btn-text">確認上傳</span>
    </button>
  </form>
  
  <div id="status"></div>
</div>

<script>
  // ⚠️ 請在這裡貼上你部署好的 Google Apps Script 網頁應用程式網址 ⚠️
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyeKlrA1LOyJkzWJ2ny5FIMbODJBSYYNgsTt8hkw9wHb_wStfeJRif3fem24PPn5hQ3-A/exec"; 

  let fileData = {};

  function showFileInfo() {
    const fileInput = document.getElementById('myFile');
    const fileInfo = document.getElementById('file-info');
    const submitBtn = document.getElementById('submit-btn');
    const promptLabel = document.getElementById('prompt-label');
    
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      fileInfo.style.display = 'block';
      fileInfo.innerHTML = `📄 <strong>${file.name}</strong> (${ (file.size/1024/1024).toFixed(2) } MB)`;
      promptLabel.innerText = "重新選取";
      submitBtn.disabled = false;
      
      const reader = new FileReader();
      reader.onload = function(e) {
        fileData = {
          base64: e.target.result,
          name: file.name
        };
      };
      reader.readAsDataURL(file);
    }
  }

  function startUpload() {
    if (!fileData.base64) return;
    
    const statusDiv = document.getElementById('status');
    const submitBtn = document.getElementById('submit-btn');
    const fileInput = document.getElementById('myFile');
    
    submitBtn.disabled = true;
    fileInput.disabled = true;
    statusDiv.className = '';
    statusDiv.innerHTML = '';
    
    submitBtn.innerHTML = '<span class="spinner"></span> 傳送中...';
    
    // 使用標準 fetch 發送 POST 請求給 Google Apps Script API
    fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(fileData)
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        statusDiv.className = 'success';
        statusDiv.innerHTML = '🎉 檔案已成功送達館員雲端硬碟！<br>現在您可以關閉這個視窗了。';
        document.getElementById('uploadForm').reset();
        document.getElementById('file-info').style.display = 'none';
        document.getElementById('prompt-label').innerText = "選擇檔案 / 拍照";
        submitBtn.disabled = true;
      } else {
        statusDiv.className = 'error';
        statusDiv.innerHTML = '❌ 上傳失敗：' + data.error;
      }
      resetBtn();
      fileInput.disabled = false;
    })
    .catch(err => {
      statusDiv.className = 'error';
      statusDiv.innerHTML = '❌ 系統連線錯誤，請重試。';
      resetBtn();
      fileInput.disabled = false;
    });
  }

  function resetBtn() {
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.innerHTML = `
      <svg class="send-icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      <span id="btn-text">確認上傳</span>
    `;
  }
</script>

</body>
</html>
